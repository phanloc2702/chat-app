services:
  postgres:
    image: postgres:16
    container_name: chat-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: chat_app
    ports:
      - '55432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: chat-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  redis:
    image: redis:7
    container_name: chat-redis
    restart: always
    ports:
      - '6379:6379'

  api1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-api-1
    restart: always
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: chat_app
      JWT_SECRET: super_secret_key
      JWT_EXPIRES_IN: 1d
      CLIENT_URL: http://localhost:4200
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: false
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: chat-images
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      MINIO_PUBLIC_ENDPOINT: minio.localhost
      MINIO_PUBLIC_PORT: 9000
    extra_hosts:
      - "minio.localhost:host-gateway"
    depends_on:
      - postgres
      - minio
      - redis

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-api-2
    restart: always
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: chat_app
      JWT_SECRET: super_secret_key
      JWT_EXPIRES_IN: 1d
      CLIENT_URL: http://localhost:4200
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: false
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: chat-images
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      MINIO_PUBLIC_ENDPOINT: minio.localhost
      MINIO_PUBLIC_PORT: 9000
    extra_hosts:
      - "minio.localhost:host-gateway"
    depends_on:
      - postgres
      - minio
      - redis

  nginx:
    image: nginx:alpine
    container_name: chat-nginx
    restart: always
    ports:
      - '3000:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2

volumes:
  postgres_data:
  minio_data: